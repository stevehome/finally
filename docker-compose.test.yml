services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - LLM_MOCK=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - testnet

  playwright:
    image: mcr.microsoft.com/playwright:v1.52.0-jammy
    working_dir: /tests
    volumes:
      - ./test:/tests
    depends_on:
      app:
        condition: service_healthy
    environment:
      - BASE_URL=http://app:8000
    command: npx playwright test --reporter=list
    networks:
      - testnet

networks:
  testnet:
    driver: bridge
